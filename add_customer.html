<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Customer – CredX</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg credx-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <span class="brand-text">Cred<span class="brand-x">X</span></span>
    </a>
    <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
      <a href="/" class="nav-back"><i class="fa-solid fa-arrow-left"></i> Dashboard</a>
      <div class="employee-chip"><i class="fa-solid fa-user-tie"></i><span>Emp: CR-4821</span></div>
    </div>
  </div>
</nav>

<div class="container py-5" style="max-width:780px">
  <!-- Header -->
  <div class="form-page-header mb-4">
    <div class="form-page-icon"><i class="fa-solid fa-user-plus"></i></div>
    <div>
      <h2 class="form-page-title">Onboard New Customer</h2>
      <p class="form-page-sub">Enter financial profile to generate AI-powered risk assessment</p>
    </div>
  </div>

  {% if error %}
  <div class="alert-credx alert-credx-danger mb-3">
    <i class="fa-solid fa-circle-exclamation"></i> {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/add_customer" id="addForm">
    <!-- Section 1: Personal Info -->
    <div class="form-card mb-4">
      <div class="form-card-header">
        <i class="fa-solid fa-id-card"></i> Personal Information
      </div>
      <div class="form-card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="credx-label">Full Name <span class="req">*</span></label>
            <input type="text" name="name" class="credx-input" placeholder="e.g. Ravi Kumar" required/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Email Address</label>
            <input type="email" name="email" class="credx-input" placeholder="customer@email.com"/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Phone Number</label>
            <input type="text" name="phone" class="credx-input" placeholder="+91-XXXXXXXXXX"/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Loan Type <span class="req">*</span></label>
            <select name="loan_type" class="credx-input" required>
              <option value="">Select loan type</option>
              <option>Personal Loan</option>
              <option>Home Loan</option>
              <option>Vehicle Loan</option>
              <option>Business Loan</option>
              <option>Education Loan</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Section 2: Financial Data -->
    <div class="form-card mb-4">
      <div class="form-card-header">
        <i class="fa-solid fa-chart-line"></i> Financial Profile
      </div>
      <div class="form-card-body">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="credx-label">Monthly Income (₹) <span class="req">*</span></label>
            <input type="number" name="income" id="income" class="credx-input" placeholder="e.g. 75000" min="0" required oninput="updatePreview()"/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Monthly Expenses (₹) <span class="req">*</span></label>
            <input type="number" name="expenses" id="expenses" class="credx-input" placeholder="e.g. 55000" min="0" required oninput="updatePreview()"/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Loan Amount (₹)</label>
            <input type="number" name="loan_amount" class="credx-input" placeholder="e.g. 500000" min="0"/>
          </div>
          <div class="col-md-6">
            <label class="credx-label">Missed Payments (last 6 months) <span class="req">*</span></label>
            <input type="number" name="missed_payments" id="missed_payments" class="credx-input" placeholder="0–6" min="0" max="6" required oninput="updatePreview()"/>
          </div>
          <div class="col-12">
            <label class="credx-label">Credit Utilization (%) <span class="req">*</span></label>
            <div class="slider-wrap">
              <input type="range" name="credit_utilization" id="credit_utilization" class="credx-slider" min="0" max="100" value="50" oninput="updatePreview(); document.getElementById('utilVal').textContent=this.value+'%'"/>
              <span class="slider-val" id="utilVal">50%</span>
            </div>
            <div class="util-preview-bar">
              <div id="utilFill" style="width:50%; background:#f59e0b; height:6px; border-radius:3px; transition:all 0.3s"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Live Risk Preview -->
    <div class="risk-preview-card mb-4" id="riskPreview">
      <div class="rp-label"><i class="fa-solid fa-brain"></i> Live Risk Estimate</div>
      <div class="rp-score" id="rpScore">—</div>
      <div class="rp-category" id="rpCategory">Fill in details above</div>
      <div class="rp-bar-wrap"><div class="rp-bar" id="rpBar"></div></div>
    </div>

    <div class="d-flex gap-3">
      <button type="submit" class="btn-credx-primary flex-grow-1">
        <i class="fa-solid fa-rocket"></i> Analyse & Save Customer
      </button>
      <a href="/" class="btn-credx-secondary">Cancel</a>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  function updatePreview() {
    const income = parseFloat(document.getElementById('income').value) || 0;
    const expenses = parseFloat(document.getElementById('expenses').value) || 0;
    const missed = parseFloat(document.getElementById('missed_payments').value) || 0;
    const util = parseFloat(document.getElementById('credit_utilization').value) || 0;

    // Update util bar color
    const utilFill = document.getElementById('utilFill');
    utilFill.style.width = util + '%';
    utilFill.style.background = util > 75 ? '#ef4444' : util > 50 ? '#f59e0b' : '#22c55e';

    if (!income) return;

    // Mimic backend ensemble
    const expRatio = Math.min(expenses / income, 1.5);
    const lr = 0.30 * expRatio + 0.35 * (missed / 6) + 0.35 * (util / 100);
    const rf = Math.sqrt(0.25 * expRatio ** 2 + 0.40 * (missed / 6) ** 2 + 0.35 * (util / 100) ** 2);
    const xgbRaw = 1.5 * (missed / 6) + 1.0 * (util / 100) + 0.5 * expRatio;
    const xgb = Math.min(xgbRaw / 3, 1.0);
    const score = Math.min((0.40 * xgb + 0.35 * rf + 0.25 * lr) * 100, 100).toFixed(1);

    const category = score >= 70 ? 'High Risk' : score >= 40 ? 'Medium Risk' : 'Low Risk';
    const color = score >= 70 ? '#ef4444' : score >= 40 ? '#f59e0b' : '#22c55e';
    const emoji = score >= 70 ? '🔴' : score >= 40 ? '🟡' : '🟢';

    document.getElementById('rpScore').textContent = score;
    document.getElementById('rpScore').style.color = color;
    document.getElementById('rpCategory').innerHTML = emoji + ' ' + category;
    document.getElementById('rpBar').style.width = score + '%';
    document.getElementById('rpBar').style.background = color;
  }
</script>
</body>
</html>
