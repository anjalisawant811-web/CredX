<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CredX</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>

  <!-- Main CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}"/>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0b1220, #111c33);
      color: #e5e7eb;
      font-family: 'DM Sans', sans-serif;
    }

    /* MAIN WRAPPER */
    .main-wrapper {
      padding: 20px 24px;
    }

    /* GLASS CONTAINER (THIS FIXES YOUR TABLE LOOK) */
    .content-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      padding: 20px;
    }

    /* FORCE DARK TABLE (WITHOUT TOUCHING sar.html) */
    .content-card table {
      background: transparent !important;
      color: #f1f5f9 !important;
    }

    .content-card table thead {
      background: rgba(255,255,255,0.05) !important;
    }

    .content-card table th {
      color: #9ca3af !important;
      border: none !important;
    }

    .content-card table td {
      color: #f1f5f9 !important;
      border-color: rgba(255,255,255,0.05) !important;
    }

    .content-card table tbody tr {
      background: transparent !important;
    }

    .content-card table tbody tr:hover {
      background: rgba(255,255,255,0.04) !important;
    }

  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg credx-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
      <span class="brand-text">Cred<span class="brand-x">X</span></span>
    </a>

    <div class="navbar-nav ms-auto d-flex flex-row align-items-center gap-3">
      <a href="/" class="nav-link text-light">Dashboard</a>
      <a href="/sar" class="nav-link text-light">SAR</a>

      <span class="nav-badge">
        <i class="fa-solid fa-circle-dot pulse-green"></i> Live
      </span>

      <div class="employee-chip">
        <i class="fa-solid fa-user-tie"></i>
        <span>Emp: CR-4821</span>
      </div>
    </div>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div class="main-wrapper">
  <div class="content-card">
    {% block content %}{% endblock %}
  </div>
</div>

</body>
</html>
